name: Commitlint
on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install
          # If you don't have package.json, install commitlint directly:
          # bun add -d @commitlint/cli @commitlint/config-conventional

      - name: Print versions (debug)
        run: |
          git --version
          bun --version
          bunx commitlint --version

      - name: Validate current commit (push)
        if: github.event_name == 'push'
        run: bunx commitlint --last --verbose

      - name: Validate PR commits
        if: github.event_name == 'pull_request'
        run: bunx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
